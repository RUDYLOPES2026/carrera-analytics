name: Dashs Probe (Graph API)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Probe Graph API
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 dashs-motor/probe_meta.py
