name: Dashs Daily (Meta Ads)

on:
  schedule:
    - cron: '0 11 * * *'  # 08:00 BRT (manhã)
    - cron: '0 15 * * *'  # 12:00 BRT (meio-dia)
    - cron: '0 22 * * *'  # 19:00 BRT
  workflow_dispatch:
    inputs:
      retry:
        description: 'true quando é o redisparo automático pós-falha (trava anti-loop)'
        required: false
        default: 'false'

permissions:
  contents: write
  pages: write
  id-token: write
  actions: write   # permite o auto-redisparo (workflow_dispatch é exceção à trava do GITHUB_TOKEN)

# grupo PRÓPRIO: se compartilhasse o grupo "pages", o cancel-in-progress do
# deploy-pages (disparado por qualquer push) matava o refresh no meio.
# Corrida de deploy é resolvida na fila do environment github-pages.
concurrency:
  group: dashs-daily
  cancel-in-progress: false

jobs:
  refresh-build-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 1) harvest Meta + monta os 9 dashs + central + escreve client/public/
      - name: run_daily (harvest + build + publish local)
        env:
          META_TOKEN: ${{ secrets.META_TOKEN }}
        run: python3 dashs-motor/run_daily.py

      # 2) commita o cofre de dados + site publicado (push do GITHUB_TOKEN não
      #    redispara workflows, por isso o deploy acontece neste mesmo job)
      - name: commit cofre + client/public
        run: |
          git config user.name "carrera-dashs-bot"
          git config user.email "dashs@carrera.local"
          git add dashs-motor/data client/public
          if git diff --cached --quiet; then
            echo "nada pra commitar"; exit 0
          fi
          git commit -m "dashs: refresh diário $(date -u +%F) [skip ci]"
          for i in 1 2 3 4 5; do
            git push origin main && break
            git pull --rebase --autostash origin main
          done

      # 3) build do site (Vite copia client/public) + deploy Pages
      - run: npm ci
      - run: npm run build
        env:
          VITE_API_URL: ${{ vars.VITE_API_URL }}
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist
      - id: deployment
        uses: actions/deploy-pages@v4

      # 4) sobrou marca com falha (mesmo após o retry interno do run_daily)?
      #    redispara UMA vez pra não deixar marca defasada até o próximo cron.
      #    O run de retry não redispara de novo (trava anti-loop via input).
      - name: redisparo automático se sobrou falha
        if: ${{ github.event.inputs.retry != 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if python3 -c "import json,sys; sys.exit(0 if json.load(open('dashs-motor/data/_last_run.json')).get('fail') else 1)"; then
            echo "marca(s) ainda com falha -> redisparando dashs-daily (retry=true)"
            gh workflow run dashs-daily.yml -R "${{ github.repository }}" -f retry=true
          else
            echo "sem falhas remanescentes, sem redisparo"
          fi

      # 5) só DEPOIS do deploy: marca o run como falho se alguma marca falhou
      #    (falha parcial publica o que passou; o vermelho aqui é o alerta)
      - name: flag falhas parciais
        run: |
          python3 - <<'EOF'
          import json, sys
          r = json.load(open('dashs-motor/data/_last_run.json'))
          if r.get('fail'):
              print('Marcas com falha neste run:', json.dumps(r['fail'], ensure_ascii=False, indent=1))
              sys.exit(1)
          print('todas as marcas ok:', r.get('ok'))
          EOF
