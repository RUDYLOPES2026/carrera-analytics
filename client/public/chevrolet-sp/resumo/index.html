// IDEMPOTENTE: marca cada objeto visitado com __liq (nao enumeravel, some do Object.keys/JSON),

// quanto no ND_MAIO da one-page, que e injetado como literal separado a partir do D em disco.
function _liqD(o,tax){
  tax=tax||1.1215;
  if(!o||typeof o!=="object") return o;
  if(Array.isArray(o)){ o.forEach(x=>_liqD(x,tax)); return o; }
  if(o.__liq) return o;
  try{ Object.defineProperty(o,"__liq",{value:true,enumerable:false}); }catch(e){ return o; }
  Object.keys(o).forEach(k=>{
    const v=o[k];
    if(typeof v==="number"){
      // 'bruto' = gasto realizado; 'cpl'/'cpr' = custo por resultado ja calculado pelo builder.
      // NAO tocar: 'liq' e 'spend' (ja liquidos), 'dailyLiq' (verba liq), 'budget'/'orcamento_bruto' (intencao).
      if(k==="bruto"||k==="cpl"||k==="cpr") o[k]=Math.round(v/tax*100)/100;
    } else _liqD(v,tax);
  });
  return o;
}
// ===== ENGINE de apontamentos (data-driven) =====
// insights(win) -> {resumo:[...], melhorias:[...]} , cada item {tone:'ok'|'warn'|'bad', txt:'...'}
// Regra: dado real ou nada. So inclui o bullet se o dado existir. Sem inventar.
function _pct(cur,prev){ if(prev==null||prev<=0||cur==null) return null; return (cur-prev)/prev*100; }
function _dir(p){ return p>0?"+":""; }
// ===== PROJEÇÃO POR INTENÇÃO (regra ÚNICA, idêntica ao build_central.py, decisão Rudy 17/jul) =====
// Fonte de verdade da projeção "Vai pagar" nos dashs individual, one-page e central.
// ritmo futuro = verba diária CONFIGURADA nos conjuntos/campanhas ACTIVE (nd_verba, líquido);
// guarda-corpos: nunca projeta abaixo da entrega recente (média dos 3 dias fechados);
// sem verba legível -> média 3d; sem nada -> ritmo médio do mês.
// projeção líq = gasto fechado (até ontem) + ritmo × (dias restantes + hoje); bruto = líq × TAX.
// ⚠ projOtim = nos últimos 3 dias a Meta entregou < 85% da verba configurada (projeção pode estar otimista).
function projMes(){
  const TAX=(typeof CFG!=='undefined'&&CFG.gross_up)||1.1215;
  const r2=x=>Math.round((+x||0)*100)/100;
  const P=(D&&D.pacing)||{days:31,elapsed:1};
  const days=+P.days||31, elapsed=Math.max(1,+P.elapsed||1);
  const kJun=(D.kpi&&D.kpi.jun&&D.kpi.jun.ALL)?D.kpi.jun.ALL:{};
  const foraBr=(typeof _foraBruto==='function')?_foraBruto('jun'):0;
  // regra de 22/jul: o D ja chega LIQUIDO (_liqD), entao kpi.bruto e nd_jun.pv.bruto sao liquidos.
  const consumed=(+kJun.bruto||0)+foraBr;                 // LIQUIDO investido MTD (comercial + PV/fora)
  const budget=(typeof BUDGET!=='undefined'&&BUDGET)?BUDGET:(+P.budget||0);   // BRUTO (o que se paga)
  const budgetLiq=budget/TAX;                             // teto de gasto na Meta
  // gasto LIQUIDO total = comercial (kpi) + PV (nd_jun.pv), identico ao spend_liq do central.
  // NAO usar 'consumed' aqui: em algumas marcas (ex.: nissan) SEG_FORA e vazio e o PV so aparece
  // em nd_jun.pv, entao consumed nao inclui PV e a projecao ficaria menor.
  const spendCommLiq=(+kJun.bruto||0);
  const pvLiq=(D.nd_jun&&D.nd_jun.pv&&+D.nd_jun.pv.bruto)||0;
  const spendLiq=spendCommLiq+pvLiq;
  // verba diária CONFIGURADA (líq) dos adsets/campanhas ACTIVE
  const ndv=(D&&Array.isArray(D.nd_verba))?D.nd_verba:[];
  const verbaLiq=r2(ndv.reduce((s,v)=>((v.status||'ACTIVE')==='ACTIVE'?s+(+v.dailyLiq||0):s),0));
  // série diária (líq): "hoje" = último dia do n_daily (parcial); fechados = anteriores
  const nd=(D&&Array.isArray(D.n_daily))?D.n_daily:[];
  const dayTot=d=>Object.keys(d).reduce((s,k)=>(k!=='date'&&d[k]&&typeof d[k]==='object'?s+(+d[k].spend||0):s),0);
  const todayISO=nd.length?nd[nd.length-1].date:null;
  const closed=nd.filter(d=>d.date!==todayISO).map(dayTot);
  const last3=closed.slice(-3);
  const media3d=last3.length?r2(last3.reduce((a,b)=>a+b,0)/last3.length):0;
  let ritmoLiq=verbaLiq>0?verbaLiq:media3d;
  if(media3d>ritmoLiq) ritmoLiq=media3d;                  // TETO: nunca abaixo da entrega recente
  if(ritmoLiq<=0) ritmoLiq=elapsed>0?spendLiq/elapsed:0;
  // ritmo da TENDÊNCIA REAL = entrega recente (média dos dias fechados); fallback: verba, depois ritmo médio
  let ritmoTendLiq=media3d>0?media3d:(verbaLiq>0?verbaLiq:(elapsed>0?spendLiq/elapsed:0));
  const hojeLiq=todayISO?dayTot(nd[nd.length-1]):0;
  const fechadoLiq=Math.max(0,spendLiq-hojeLiq);
  const projLiq=fechadoLiq+ritmoLiq*(days-elapsed+1);
  const proj=projLiq*TAX;                                  // TETO (verba cheia = intenção)
  const projPct=budget>0?proj/budget:0;
  const projTendLiq=fechadoLiq+ritmoTendLiq*(days-elapsed+1);
  const projTend=projTendLiq*TAX;                          // TENDÊNCIA REAL (principal)
  const projTendPct=budget>0?projTend/budget:0;
  const entrega=(verbaLiq>0&&media3d>0)?media3d/verbaLiq:null;
  const projOtim=(entrega!==null&&entrega<0.85);           // gap = verba configurada não entregue pela Meta
  const gap=Math.max(0,proj-projTend);
  const future=days-elapsed;
  const daily=elapsed>0?consumed/elapsed:0;               // média diária REALIZADA (líquido), informativo
  const need=future>0?(budgetLiq-consumed)/future:0;     // LIQUIDO/dia pra fechar o orcamento
  return {TAX,days,elapsed,consumed,budget,budgetLiq,spendLiq,verbaLiq,media3d,ritmoLiq,
          ritmoTendLiq,ritmoTendBruto:ritmoTendLiq*TAX,projTendLiq,projTend,projTendPct,gap,
          ritmoBruto:ritmoLiq*TAX,hojeLiq,fechadoLiq,projLiq,proj,projPct,
          entrega,projOtim,future,daily,need};
}
function insights(win){
  win=win||WIN;
  const resumo=[], melhorias=[];
  const K=(D.kpi&&D.kpi[win])?D.kpi[win]:{};
  const all=K.ALL||{bruto:0,leads:0,conv:0};
  const res=(all.leads||0)+(all.conv||0);
  const cpl=res?all.bruto/res:0;
  const budget=BUDGET||0;
  // base MoM da janela: MTD -> mesmo periodo do mes anterior; 30d -> mes anterior inteiro
  const _MOMB=momBase(win), _MOMV=("vs "+momLbl(win).toLowerCase());
  const hasMaio=!!(_MOMB && _MOMB.total);

  // ---------- RESUMO ----------
  // 1) Pacing , investido vs orcamento + projecao (investido = comercial + PV/segForaTotal, mesma verba)
  const _investJun=(D.kpi&&D.kpi.jun&&D.kpi.jun.ALL?D.kpi.jun.ALL.bruto:0)+((typeof _foraBruto==="function")?_foraBruto("jun"):0);
  if(budget>0 && _investJun>0){
    const _TAXi=(typeof GROSSUP!=='undefined'?GROSSUP:1.1215);
    const pctC=_investJun/(budget/_TAXi)*100;   // liquido vs teto liquido: mesma razao, sem misturar unidade
    const _pj=projMes();
    const proj=_pj.projTend;
    const projTxt=proj>0?`, tendência de fechar em ${brl(proj)} (${(_pj.projTendPct*100).toFixed(0)}% da meta; teto pela verba cheia ${brl(_pj.proj)}${_pj.projOtim?', Meta entregando < 85% da verba ⚠':''})`:"";
    const tone = (proj>0 && (_pj.projTendPct>1.1 || _pj.projTendPct<0.9)) ? "warn" : "ok";
    resumo.push({tone, txt:`Investiu ${brl(_investJun)} na Meta, ${pctC.toFixed(0)}% do orçamento de ${brl(budget)} (com imposto)${projTxt}.`});
  }
  // 2) vs mes anterior (mesma janela, via momBase): leads, conversas, custo
  if(hasMaio){
    const dLeads=_pct(all.leads,_MOMB.total.leads);
    const dConv=_pct(all.conv,_MOMB.total.conv);
    const dCusto=_pct(cpl,_MOMB.total.cpl);
    const parts=[];
    if(dLeads!=null) parts.push(`leads ${_dir(dLeads)}${dLeads.toFixed(0)}%`);
    if(dConv!=null) parts.push(`conversas ${_dir(dConv)}${dConv.toFixed(0)}%`);
    if(dCusto!=null) parts.push(`custo/resultado ${_dir(dCusto)}${dCusto.toFixed(0)}%`);
    if(parts.length){
      const efic = (dCusto!=null && dCusto<-2);
      const tone = (dCusto!=null) ? (dCusto<0?"ok":(dCusto>5?"warn":"ok")) : "ok";
      const tail = efic ? (" Mês mais eficiente que "+MOMNM_LC+".") : (dCusto!=null && dCusto>5 ? (" Custo subiu "+_MOMV+".") : "");
      resumo.push({tone, txt:`${_MOMV}: ${parts.join(", ")}.${tail}`});
    }
  }
  // 3) Segmento que mais pesa (maior bruto) + participacao
  if(MULTISEG){
    let top=null;
    const _segT=(typeof SEG_TOTAL!=="undefined")?SEG_TOTAL:SEGMENTS;
    _segT.forEach(s=>{ const k=K[s]; if(k&&k.bruto>0){ if(!top||k.bruto>top.bruto) top={seg:s,bruto:k.bruto}; }});
    if(top && all.bruto>0){
      resumo.push({tone:"ok", txt:`${SEGN[top.seg]} é quem mais pesa: ${brl(top.bruto)}, ${(top.bruto/all.bruto*100).toFixed(0)}% da verba.`});
    }
  }
  // 4) Regiao mais barata x mais cara por CPL (aggRegion)
  if(HASREGION){
    const A=aggRegion(win,"ALL","all");
    const regs=REGIONS.map(r=>({r, d:A[r]})).filter(x=>x.d && x.d.spend>0 && x.d.cpr>0);
    if(regs.length>=2){
      regs.sort((a,b)=>a.d.cpr-b.d.cpr);
      const cheap=regs[0], dear=regs[regs.length-1];
      const mult=cheap.d.cpr>0?(dear.d.cpr/cheap.d.cpr):0;
      resumo.push({tone:"ok", txt:`${REGSHORT[cheap.r]} roda a ${brl2(cheap.d.cpr)}/resultado, a praça mais barata; ${REGSHORT[dear.r]} sai ${mult.toFixed(1).replace(".",",")}× mais caro (${brl2(dear.d.cpr)}).`});
    }
  }
  // 5) Canal: Form vs WhatsApp , custo de cada (via chanFor agregado)
  (function(){
    const C=chanFor("ALL",win);
    const f=C.Form, w=C.WhatsApp;
    const fc=(f&&f.leads>0)?f.bruto/f.leads:0;
    const wc=(w&&w.conv>0)?w.bruto/w.conv:0;
    if(fc>0 && wc>0){
      const cheaper = wc<fc ? "WhatsApp" : "Formulário";
      resumo.push({tone:"ok", txt:`Formulário a ${brl2(fc)}/lead e WhatsApp a ${brl2(wc)}/conversa; ${cheaper} é o canal mais barato.`});
    } else if(fc>0){
      resumo.push({tone:"ok", txt:`Formulário traz lead a ${brl2(fc)}.`});
    } else if(wc>0){
      resumo.push({tone:"ok", txt:`WhatsApp traz conversa a ${brl2(wc)}.`});
    }
  })();

  // ---------- MELHORIAS ----------
  // Farol da janela pedida (FAROL_REF e calculado sobre WIN; recalcula local pra coerencia com `win`)
  const adsWin=(D.ads&&D.ads[win])?D.ads[win]:[];
  const ativos=adsWin.filter(a=>a.st==="ACTIVE");
  const refArr=ativos.filter(a=>a.res>0&&a.cpr>0).map(a=>a.cpr);
  const ref=_median(refArr);
  const medSpend=_median(ativos.map(a=>a.bruto||0));
  function _flag(a){
    if(a.st!=="ACTIVE") return "off";
    if(a.res===0 && (a.bruto||0)>=medSpend) return "stop";
    const c=a.cpr||0;
    if(c>0&&ref>0){ if(c<=0.7*ref) return "up"; if(c<=1.3*ref) return "keep"; if(c<=2.0*ref) return "down"; return "stop"; }
    return "keep";
  }
  // 1) Realocacao: regiao com CPL muito acima da media da conta
  if(HASREGION && cpl>0){
    const A=aggRegion(win,"ALL","all");
    const regs=REGIONS.map(r=>({r,d:A[r]})).filter(x=>x.d&&x.d.spend>0&&x.d.cpr>0);
    const worst=regs.slice().sort((a,b)=>b.d.cpr-a.d.cpr)[0];
    if(worst && worst.d.cpr>cpl*1.4){
      melhorias.push({tone:"warn", txt:`${REGSHORT[worst.r]} está a ${brl2(worst.d.cpr)}/resultado, ${(worst.d.cpr/cpl).toFixed(1).replace(".",",")}× a média da conta (${brl2(cpl)}). Revisar criativo e verba dessa praça.`});
    }
  }
  // 2) Criativos a ESCALAR (farol Aumentar) + melhor
  const upList=ativos.filter(a=>_flag(a)==="up");
  if(upList.length){
    const best=upList.slice().sort((a,b)=>a.cpr-b.cpr)[0];
    melhorias.push({tone:"ok", txt:`${upList.length} criativo${upList.length>1?"s":""} no farol Aumentar (custo baixo). Escalar enquanto segura, melhor deles: ${best.nome} a ${brl2(best.cpr)}/resultado.`});
  }
  // 3) Criativos a PAUSAR + desperdicio (gasto dos que estao com 0 resultado e gasto >= mediana)
  const stopList=ativos.filter(a=>_flag(a)==="stop");
  const COMM=(typeof CHANNELS!=="undefined"&&CHANNELS.length)?CHANNELS:["Form","WhatsApp"];
  const semRetorno=ativos.filter(a=>COMM.includes(a.canal) && a.res===0 && (a.bruto||0)>0);
  const comCliqueSemRes=semRetorno.filter(a=>(a.ctr||0)>0).length;
  const queimado=semRetorno.reduce((s,a)=>s+(a.bruto||0),0);
  if(semRetorno.length || stopList.length){
    const clkTxt = comCliqueSemRes>0 ? ` ${comCliqueSemRes} tiveram cliques, mas nenhum virou lead ou conversa.` : "";
    melhorias.push({tone:"bad", txt:`${semRetorno.length} criativo${semRetorno.length>1?"s":""} de ${COMM.join("/")} sem nenhum lead nem conversa queimaram ${brl(queimado)} na janela.${clkTxt} Engajamento e awareness ficam fora, têm outro objetivo.`});
    const med=(typeof FAROL_REF!=="undefined"&&FAROL_REF.medSpend)||0;
    const relev=semRetorno.filter(a=>(a.bruto||0)>=med).sort((x,y)=>(y.bruto||0)-(x.bruto||0));
    const relevSum=relev.reduce((s,a)=>s+(a.bruto||0),0);
    const top=relev.slice(0,3).map(a=>`${(a.nome||"sem nome").slice(0,30)} (${brl(a.bruto)})`);
    const cm={}; semRetorno.forEach(a=>{const c=a.canal||"Outro"; cm[c]=(cm[c]||0)+(a.bruto||0);});
    const _cl=(c)=>(typeof CHANN!=="undefined"&&CHANN[c])||c;
    const canalTxt=Object.keys(cm).sort((x,y)=>cm[y]-cm[x]).map(c=>`${_cl(c)} ${brl(cm[c])}`).join(", ");
    if(relev.length){
      melhorias.push({tone:"warn", txt:`Foco: ${relev.length} com gasto acima da mediana somam ${brl(relevSum)}, comece por: ${top.join(", ")}. Por canal: ${canalTxt}.`});
    } else if(canalTxt){
      melhorias.push({tone:"warn", txt:`O desperdício é cauda longa, muitos de gasto baixo. Por canal: ${canalTxt}. Revisar em lote.`});
    }
  }
  // 4) Custo subindo vs mes anterior (mesma janela)
  if(hasMaio){
    const dCusto=_pct(cpl,_MOMB.total.cpl);
    if(dCusto!=null && dCusto>5){
      melhorias.push({tone:"warn", txt:`Custo/resultado subiu ${dCusto.toFixed(0)}% ${_MOMV} (de ${brl2(_MOMB.total.cpl)} para ${brl2(cpl)}). Atenção ao que encareceu antes de escalar verba.`});
    }
  }
  // 5) Pacing: ajuste de ritmo se projecao estoura ou sobra muito (so quando ainda da pra agir, future>=3 dias)
  if(budget>0 && D.pacing && D.pacing.elapsed>0 && D.pacing.days>0){
    const _pj=projMes();
    const consumed=_pj.consumed, future=_pj.future, proj=_pj.projTend, need=_pj.need, ritmoB=_pj.ritmoTendBruto;
    if(future>=3 && _pj.projTendPct>1.1){
      melhorias.push({tone:"warn", txt:`No ritmo de entrega recente (${brl(ritmoB)}/dia bruto) a tendência estoura a meta (${brl(proj)}). Segurar a verba para ~${brl(need)}/dia nos ${future} dias restantes.`});
    } else if(future>=3 && _pj.projTendPct<0.9){
      melhorias.push({tone:"warn", txt:`Tendência fecha em ${brl(proj)}, ${(100-_pj.projTendPct*100).toFixed(0)}% abaixo da meta${_pj.projOtim?' , a verba configurada projetaria '+brl(_pj.proj)+' mas a Meta entrega < 85% dela (gap +'+brl(_pj.gap)+' de verba parada ⚠)':''}. Espaço para escalar o que performa e destravar a entrega (para fechar, ~${brl(need)}/dia).`});
    } else if(future>0 && future<3){
      const restante=Math.max(0,budget-consumed);
      melhorias.push({tone:"ok", txt:`Mês quase fechado: ${future} dia${future>1?"s":""} restante${future>1?"s":""}, ${brl(restante)} de orçamento livre. Tendência ${brl(proj)}, dentro da meta.`});
    }
  }
  return {resumo, melhorias};
}

function _insightBullet(it){
  const map={ok:"#34d399",warn:"#fbbf24",bad:"#f87171"};
  const ico={ok:"●",warn:"▲",bad:"■"};
  const c=map[it.tone]||"#a1a1aa";
  return '<li class="insbullet"><span class="insdot" style="color:'+c+'">'+(ico[it.tone]||"•")+'</span><span class="instxt">'+it.txt+'</span></li>';
}

  FAROL_REF=farolRef(WIN);
  // cabecalho
  document.getElementById("rlogo").textContent=(BRANDNM||"·").slice(0,1).toUpperCase();
  document.getElementById("rbrand").innerHTML=BRANDNM+' <b>·</b> Resumo executivo';
  document.getElementById("rsub").textContent=(CFG.subtitle||"Acompanhamento Comercial");
  const per=D.parcial?"":"";
  const asof=(D.pacing&&D.pacing.asof)?D.pacing.asof:"";
  document.getElementById("rpill").innerHTML='Período: <b>'+MESNM+' (parcial)</b>'+(asof?' · até '+asof:'')+(BUDGET?'<br>Orçamento: <b>'+brl(BUDGET)+'</b>':'');
  // big numbers + comparativo vs mes anterior

  const _vsl="vs "+momLbl(WIN).toLowerCase();
  const dInv = M?_momDelta(k.bruto,M.bruto,false,_vsl):""; // investimento: nao ha "melhor", so direcao

  const dCusto=M?_momDelta(cpl,M.cpl,false,_vsl):"";

  // linha de pacing
  const P=D.pacing;
  if(P&&BUDGET>0){
    const _pj=(typeof projMes==='function')?projMes():null;
    const consumed=D.kpi.jun.ALL.bruto, proj=_pj?_pj.projTend:consumed;
    const projPct=_pj?_pj.projTendPct:0, projOtim=_pj?_pj.projOtim:false;
    const projTeto=_pj?_pj.proj:0, projTetoPct=_pj?_pj.projPct:0;
    const entregaPct=(_pj&&_pj.entrega!=null)?Math.round(_pj.entrega*100):null;
    const items=[
      {l:"Já gastou",v:brl(consumed)+" ("+(consumed/BUDGET*100).toFixed(0)+"%)"},
      {l:"Vai fechar (ritmo de agora)",v:brl(proj)+" ("+(projPct*100).toFixed(0)+"%)"+((projOtim&&entregaPct!=null)?" ⚠ entregando "+entregaPct+"%":"")},
      {l:"Teto se gastar toda a verba",v:brl(projTeto)+" ("+(projTetoPct*100).toFixed(0)+"%)"},
      {l:"Orçamento",v:brl(BUDGET)},
      {l:"Dias",v:P.elapsed+" de "+P.days}
    ];
    document.getElementById("pacingline").innerHTML=items.map(x=>'<div class="pl-it"><span class="pl-l">'+x.l+'</span><span class="pl-v">'+x.v+'</span></div>').join("");
  } else { document.getElementById("pacingline").style.display="none"; }
  // engine
  const o=insights(WIN);
  document.getElementById("resumoList").innerHTML=o.resumo.map(_insightBullet).join("")||'<li class="insbullet"><span class="instxt" style="color:#8b8b93">Sem dados suficientes.</span></li>';
  document.getElementById("melhoriasList").innerHTML=o.melhorias.map(_insightBullet).join("")||'<li class="insbullet"><span class="instxt" style="color:#8b8b93">Nada crítico apontado.</span></li>';
  // top 3 e piores (compacto) , da base D.ads[WIN]
  const ads=(D.ads&&D.ads[WIN])?D.ads[WIN].slice():[];
  const top=ads.filter(a=>a.res>0&&a.cpr>0).sort((a,b)=>a.cpr-b.cpr).slice(0,3);
  const piores=ads.filter(a=>a.st==="ACTIVE"&&a.res===0&&(a.bruto||0)>0).sort((a,b)=>b.bruto-a.bruto).slice(0,3);
  function nm(a){return (a.nome||"").replace(/^[0-9]+[-_]?/,"").slice(0,46);}
  let cr="";
  if(top.length){
    cr+='<div class="cbox"><h4>▲ Top 3 criativos (menor custo)</h4>'+top.map(a=>'<div class="crow"><span class="cn" title="'+(a.nome||"")+'">'+nm(a)+'</span><span class="cv" style="color:#34d399">'+brl2(a.cpr)+'/res · '+brl(a.bruto)+'</span></div>').join("")+'</div>';
  }
  if(piores.length){
    cr+='<div class="cbox"><h4>■ Piores ativos (gasto sem resultado)</h4>'+piores.map(a=>'<div class="crow"><span class="cn" title="'+(a.nome||"")+'">'+nm(a)+'</span><span class="cv" style="color:#f87171">'+brl(a.bruto)+' · 0 res</span></div>').join("")+'</div>';
  }
  const cw=document.getElementById("creatives");
  if(cr){cw.innerHTML=cr;}else{cw.style.display="none";}
  // rodape
  const ger=D.gerado?(" · gerado "+D.gerado):"";
  document.getElementById("rfoot").innerHTML="Valores BRUTO (gross-up 12,15%). Retrato de "+MESNM_LC+" (parcial)"+(ND_MOMSP?(", comparativos contra o mesmo período de "+MOMNM_LC+" ("+MOMSP_PER+")"):(hasMaioConst?(", comparativos "+VS_MOM+" fechado"):""))+". Fonte: API Meta Ads"+ger+".";
}
if(typeof document!=="undefined"&&document.getElementById){renderResumo();}
</script>
</body></html>
